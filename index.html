<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>My Cat Robot</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none; /* デフォルトのスクロールなどを禁止 */
            user-select: none;
        }

        #robot-face {
            font-family: "Courier New", Courier, monospace;
            font-size: 15vw;
            color: #ffffff;
            transition: transform 0.1s ease;
            text-align: center;
            white-space: nowrap;
        }

        .shake-effect {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div id="robot-face">l ω l</div>

    <script>
        const face = document.getElementById('robot-face');
        let timer = null;

        const FACES = {
            normal: "l ω l",
            tap: "+ ω +",
            swiping: "- ω -",
            swiped: "l ω -",
            charge: "⚡ω⚡",
            shaking: "𖦹 ω 𖦹;"
        };

        // 顔を更新する関数
        function updateFace(status, duration = 0) {
            if (timer) clearTimeout(timer);
            face.innerText = FACES[status];
            
            if (status === 'shaking') {
                face.classList.add('shake-effect');
            } else {
                face.classList.remove('shake-effect');
            }

            if (duration > 0) {
                timer = setTimeout(() => {
                    face.innerText = FACES.normal;
                    face.classList.remove('shake-effect');
                }, duration);
            }
        }

        // --- タップ & スワイプ ---
        window.addEventListener('touchstart', (e) => {
            // iOSのセンサー許可リクエスト（初回のみ）
            requestSensorPermission();
            updateFace('tap');
        });

        window.addEventListener('touchmove', () => {
            updateFace('swiping');
        });

        window.addEventListener('touchend', () => {
            updateFace('swiped', 1000);
        });

        // --- 充電検知 ---
        if ('getBattery' in navigator) {
            navigator.getBattery().then(battery => {
                battery.addEventListener('chargingchange', () => {
                    if (battery.charging) {
                        updateFace('charge', 1000);
                    }
                });
            });
        }

        // --- シェイク検知 ---
        let lastX, lastY, lastZ;
        let threshold = 15; // 揺れのしきい値

        function requestSensorPermission() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        }

        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc.x) return;

            let diff = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
            if (diff > threshold) {
                updateFace('shaking', 1000);
            }
            lastX = acc.x;
            lastY = acc.y;
            lastZ = acc.z;
        }
    </script>
</body>
</html>
