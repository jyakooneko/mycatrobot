<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>My Cat Robot</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #robot-face {
            font-family: "Courier New", Courier, monospace;
            font-size: 15vw;
            color: #ffffff;
            transition: transform 0.1s ease;
            text-align: center;
            white-space: nowrap;
        }

        /* 起動用オーバーレイ */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            font-family: sans-serif;
            cursor: pointer;
        }

        .instruction {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .shake-effect {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div style="font-family: 'Courier New', monospace; font-size: 15vw;">- ω -</div>
        <div class="instruction">Tap to Wake Up</div>
    </div>
    <div id="robot-face">- ω -</div>

    <script>
        const face = document.getElementById('robot-face');
        const overlay = document.getElementById('overlay');
        let timer = null;
        let isSwiping = false;
        let isAwake = false;

        const FACES = {
            normal: "l ω l",
            sleep: "- ω -",
            tap: "+ ω +",
            swiping: "- ω -",
            charge: "⚡ω⚡",
            shaking: "𖦹 ω 𖦹;"
        };

        function updateFace(status, duration = 0) {
            if (!isAwake && status !== 'normal') return; 
            
            if (timer) clearTimeout(timer);
            face.innerText = FACES[status];
            
            if (status === 'shaking') {
                face.classList.add('shake-effect');
            } else {
                face.classList.remove('shake-effect');
            }

            if (duration > 0) {
                timer = setTimeout(() => {
                    face.innerText = FACES.normal;
                    face.classList.remove('shake-effect');
                }, duration);
            }
        }

        // --- 起動処理 ---
        overlay.addEventListener('click', () => {
            isAwake = true;
            overlay.style.display = 'none';
            updateFace('normal'); // 起動したら「l ω l」に
            initSensors();
        });

        function initSensors() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                        }
                    }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }

            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    if (battery.charging) updateFace('charge', 1500);
                    battery.addEventListener('chargingchange', () => {
                        if (battery.charging) updateFace('charge', 1500);
                    });
                });
            }
        }

        // --- インタラクション ---
        window.addEventListener('touchstart', (e) => {
            if (!isAwake) return;
            isSwiping = false;
        });

        window.addEventListener('touchmove', () => {
            if (!isAwake) return;
            isSwiping = true;
            updateFace('swiping');
        });

        window.addEventListener('touchend', () => {
            if (!isAwake) return;
            if (!isSwiping) {
                updateFace('tap', 1000);
            } else {
                updateFace('normal');
            }
            isSwiping = false;
        });

        // --- シェイク検知 ---
        let lastX, lastY, lastZ;
        let threshold = 18;

        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            if (lastX !== undefined) {
                let diff = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
                if (diff > threshold) {
                    updateFace('shaking', 1000);
                }
            }
            lastX = acc.x;
            lastY = acc.y;
            lastZ = acc.z;
        }
    </script>
</body>
</html>
